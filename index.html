<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IB ESS Study Platform</title>
  <style>
    :root {
      --bg-1: #eef4ff;
      --bg-2: #f8fbff;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: #ffffff;
      --text: #18212f;
      --muted: #64748b;
      --line: rgba(148, 163, 184, 0.28);
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --success: #0f766e;
      --error: #b91c1c;
      --keyword: #fef08a;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 32%),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.08), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      padding: 24px 16px 40px;
    }

    .container {
      width: min(1100px, 100%);
      margin: 0 auto;
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 4vw, 36px);
      text-align: center;
      letter-spacing: -0.03em;
    }

    .muted {
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
      text-align: center;
    }

    .panel {
      width: min(1000px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .group-title {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .check-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    label.filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      background: rgba(255,255,255,0.92);
      transition: 0.18s ease;
      user-select: none;
    }

    label.filter-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, 0.25);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.08);
    }

    .controls-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    button,
    select,
    input[type="text"] {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255,255,255,0.98);
      color: var(--text);
      transition: 0.18s ease;
    }

    button { cursor: pointer; }

    button:hover,
    select:hover,
    input[type="text"]:hover {
      border-color: rgba(37, 99, 235, 0.28);
    }

    button:focus-visible,
    select:focus-visible,
    input[type="text"]:focus-visible,
    .flashcard-shell:focus-visible,
    .nav-arrow:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.22);
      outline-offset: 2px;
    }

    .primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    .primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.28);
    }

    .mode-bottom {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .study-stage {
      width: min(1000px, 100%);
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr) 88px;
      align-items: center;
      gap: 20px;
    }

    .nav-arrow {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.88);
      font-size: 34px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      transition: 0.18s ease;
    }

    .nav-arrow:hover {
      transform: translateY(-2px) scale(1.02);
      background: white;
    }

    .flashcard-shell {
      width: 100%;
      min-height: 520px;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      perspective: 1400px;
    }

    .flashcard-inner {
      position: relative;
      width: 100%;
      min-height: 520px;
      transition: transform 0.65s cubic-bezier(.2,.8,.2,1);
      transform-style: preserve-3d;
    }

    .flashcard-shell.is-flipped .flashcard-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(248,250,252,0.95));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .card-face.back-face {
      transform: rotateY(180deg);
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 28px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(248, 250, 252, 0.95);
      font-weight: 600;
    }

    .face-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 14px;
      min-height: 0;
    }

    .front {
      font-size: clamp(34px, 5vw, 56px);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 14ch;
      text-wrap: balance;
    }

    .back-text {
      font-size: clamp(20px, 2.1vw, 28px);
      line-height: 1.55;
      max-width: 28ch;
      text-wrap: balance;
    }

    .zh {
      color: var(--muted);
      font-size: clamp(16px, 1.6vw, 20px);
      max-width: 32ch;
      text-wrap: balance;
    }

    mark {
      background: var(--keyword);
      padding: 0 4px;
      border-radius: 4px;
    }

    .card-image {
      max-width: min(100%, 420px);
      max-height: 220px;
      border: 1px solid var(--line);
      border-radius: 16px;
      display: none;
      object-fit: contain;
      background: #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .card-image.show { display: block; }

    .face-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .panel-content {
      width: 100%;
      min-height: 520px;
      background: linear-gradient(180deg, rgba(255,255,255,0.97), rgba(248,250,252,0.95));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
    }

    .quiz-area {
      display: none;
      width: 100%;
    }

    .quiz-area.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 10px;
      width: min(700px, 100%);
    }

    .choice {
      text-align: center;
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
    }

    .feedback {
      margin-top: 12px;
      font-weight: 700;
      min-height: 24px;
    }

    .ok { color: var(--success); }
    .bad { color: var(--error); }

    .status {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px 16px;
    }

    @media (max-width: 920px) {
      .filters {
        grid-template-columns: 1fr;
      }

      .study-stage {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .nav-row-mobile {
        display: flex;
        justify-content: center;
        gap: 16px;
      }

      .nav-arrow {
        width: 64px;
        height: 64px;
      }

      .flashcard-shell,
      .flashcard-inner,
      .panel-content {
        min-height: 460px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding-inline: 12px;
      }

      .card-face,
      .panel-content,
      .panel {
        padding: 16px;
      }

      .flashcard-shell,
      .flashcard-inner,
      .panel-content {
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>IB ESS Flashcards</h1>
    <p class="muted">Choose filters, study with randomized cards, and flip the center card like a real flashcard.</p>

    <section class="panel filters">
      <div>
        <h3 class="group-title">Units</h3>
        <div id="unitFilters" class="check-list"></div>
      </div>
      <div>
        <h3 class="group-title">Level</h3>
        <div id="levelFilters" class="check-list"></div>
      </div>
      <div>
        <h3 class="group-title">Type</h3>
        <div id="categoryFilters" class="check-list"></div>
      </div>
    </section>

    <section class="panel controls-wrap">
      <div class="controls">
        <label for="modeSelect">Mode:</label>
        <select id="modeSelect">
          <option value="study">Study mode</option>
          <option value="mcq">Multiple choice mode</option>
          <option value="keyword">Keyword mode</option>
        </select>

        <button id="toggleAnswerBtn">Flip card (Space)</button>
        <button id="toggleChineseBtn">Chinese: Off (C)</button>
      </div>
      <div class="mode-bottom">Shortcuts: <strong>Space</strong> flip card, <strong>←</strong> previous, <strong>→</strong> next, <strong>C</strong> toggle Chinese.</div>
    </section>

    <section class="study-stage">
      <div class="nav-row-mobile">
        <button id="prevBtn" class="nav-arrow" aria-label="Previous card">&#8592;</button>
      </div>

      <div id="cardStage"></div>

      <div class="nav-row-mobile">
        <button id="nextBtn" class="nav-arrow" aria-label="Next card">&#8594;</button>
      </div>
    </section>

    <div class="status" id="status"></div>
  </div>

  <script>
    const DEFAULT_LEVELS = ['SL', 'HL'];
    const DEFAULT_CATEGORIES = ['vocab', 'concept'];

    let allCards = [];
    let filteredCards = [];
    let studyOrder = [];
    let currentIndex = 0;
    let showChinese = false;
    let showBack = false;

    const unitFiltersEl = document.getElementById('unitFilters');
    const levelFiltersEl = document.getElementById('levelFilters');
    const categoryFiltersEl = document.getElementById('categoryFilters');

    const modeSelectEl = document.getElementById('modeSelect');
    const toggleAnswerBtn = document.getElementById('toggleAnswerBtn');
    const toggleChineseBtn = document.getElementById('toggleChineseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const cardStageEl = document.getElementById('cardStage');
    const statusEl = document.getElementById('status');

    async function loadCards() {
      try {
        const response = await fetch('cards.json');
        allCards = await response.json();

        buildCheckboxGroup(unitFiltersEl, uniqueValues(allCards, 'unit'), true);
        buildCheckboxGroup(levelFiltersEl, DEFAULT_LEVELS, true);
        buildCheckboxGroup(categoryFiltersEl, DEFAULT_CATEGORIES, true);

        applyFilters();
      } catch (error) {
        cardStageEl.innerHTML = `
          <div class="panel-content empty-state">
            <div style="font-size: 28px; font-weight: 800; color: var(--text);">Error loading cards.json</div>
            <div>Make sure index.html and cards.json are in the same folder.</div>
          </div>
        `;
      }
    }

    function uniqueValues(cards, field) {
      return [...new Set(cards.map(card => card[field]).filter(Boolean))].sort();
    }

    function buildCheckboxGroup(container, values, checked) {
      container.innerHTML = '';
      for (const value of values) {
        const id = `${container.id}-${String(value).toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;
        const label = document.createElement('label');
        label.className = 'filter-chip';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.value = value;
        input.checked = checked;
        input.id = id;
        input.addEventListener('change', applyFilters);
        label.htmlFor = id;
        label.appendChild(input);
        label.append(document.createTextNode(value));
        container.appendChild(label);
      }
    }

    function selectedValues(container) {
      return Array.from(container.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
    }

    function shuffled(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function rebuildStudyOrder() {
      studyOrder = shuffled(filteredCards);
      currentIndex = 0;
      showBack = false;
    }

    function applyFilters() {
      const units = selectedValues(unitFiltersEl);
      const levels = selectedValues(levelFiltersEl);
      const categories = selectedValues(categoryFiltersEl);

      filteredCards = allCards.filter(card =>
        units.includes(card.unit) &&
        levels.includes(card.level) &&
        categories.includes(card.category)
      );

      rebuildStudyOrder();
      renderCurrent();
    }

    function currentMode() {
      return modeSelectEl.value;
    }

    function activeDeck() {
      return currentMode() === 'study' ? studyOrder : filteredCards;
    }

    function getCurrentCard() {
      return activeDeck()[currentIndex];
    }

    function resetPositionIfNeeded() {
      const deck = activeDeck();
      if (!deck.length) {
        currentIndex = 0;
        return;
      }
      if (currentIndex >= deck.length) currentIndex = 0;
      if (currentIndex < 0) currentIndex = deck.length - 1;
    }

    function escapeRegExp(text) {
	  return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
	}

    function highlightKeywords(text, keywords = []) {
      if (!text || !keywords.length) return text;
      let html = text;
      const sorted = [...keywords].sort((a, b) => b.length - a.length);
      for (const keyword of sorted) {
        if (!keyword) continue;
        const regex = new RegExp(`(${escapeRegExp(keyword)})`, 'gi');
        html = html.replace(regex, '<mark>$1</mark>');
      }
      return html;
    }

    function renderMeta(card) {
      return [card.unit, card.level, card.category]
        .filter(Boolean)
        .map(tag => `<span class="pill">${tag}</span>`)
        .join('');
    }

    function renderStudy(card) {
      const frontZh = showChinese && card.front_zh ? `<div class="zh">${card.front_zh}</div>` : '';
      const backZh = showChinese && card.back_zh ? `<div class="zh">${card.back_zh}</div>` : '';
      const imageHtml = card.image ? `<img class="card-image${showBack ? ' show' : ''}" src="images/${card.image}" alt="Card visual" />` : '';

      cardStageEl.innerHTML = `
        <button class="flashcard-shell ${showBack ? 'is-flipped' : ''}" id="flashcardShell" aria-label="Flip card">
          <div class="flashcard-inner">
            <div class="card-face front-face">
              <div class="meta">${renderMeta(card)}</div>
              <div class="face-center">
                <div class="front">${card.front}</div>
                ${frontZh}
              </div>
              <div class="face-footer">Click the card to flip</div>
            </div>
            <div class="card-face back-face">
              <div class="meta">${renderMeta(card)}</div>
              <div class="face-center">
                <div class="back-text">${highlightKeywords(card.back, card.keywords)}</div>
                ${backZh}
                ${imageHtml}
              </div>
              <div class="face-footer">Click the card to flip back</div>
            </div>
          </div>
        </button>
      `;

      document.getElementById('flashcardShell').addEventListener('click', toggleAnswer);
      toggleAnswerBtn.textContent = showBack ? 'Flip to front (Space)' : 'Flip card (Space)';
    }

    function buildMcqOptions(card) {
      const direction = Math.random() < 0.5 ? 'front-to-back' : 'back-to-front';
      const correct = direction === 'front-to-back' ? card.back : card.front;

      const pool = shuffled(filteredCards.filter(c => c.id !== card.id))
        .map(c => (direction === 'front-to-back' ? c.back : c.front))
        .filter(Boolean);

      const distractors = [];
      for (const candidate of pool) {
        if (candidate !== correct && !distractors.includes(candidate)) distractors.push(candidate);
        if (distractors.length === 3) break;
      }

      const options = shuffled([correct, ...distractors]).slice(0, 4);
      return { direction, correct, options };
    }

    function renderMcq(card) {
      const { direction, correct, options } = buildMcqOptions(card);
      const prompt = direction === 'front-to-back'
        ? `Choose the correct answer for: ${card.front}`
        : `Choose the matching front for: ${card.back}`;

      cardStageEl.innerHTML = `
        <div class="panel-content">
          <div class="meta">${renderMeta(card)}</div>
          <div class="face-center" style="width: 100%;">
            <div class="front" style="font-size: clamp(24px, 3vw, 34px); max-width: 18ch;">Multiple Choice</div>
            ${showChinese && card.front_zh ? `<div class="zh">参考: ${card.front_zh}</div>` : ''}
            <div style="font-size: clamp(18px, 2vw, 24px); line-height: 1.5; max-width: 32ch;">${prompt}</div>
            <div class="choices" id="choices"></div>
            <div class="feedback" id="mcqFeedback"></div>
          </div>
        </div>
      `;

      const choicesEl = document.getElementById('choices');
      const mcqFeedbackEl = document.getElementById('mcqFeedback');
      options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = option;
        btn.addEventListener('click', () => {
          const isCorrect = option === correct;
          mcqFeedbackEl.textContent = isCorrect ? 'Correct!' : 'Not quite.';
          mcqFeedbackEl.className = `feedback ${isCorrect ? 'ok' : 'bad'}`;
        });
        choicesEl.appendChild(btn);
      });
    }

    function renderKeyword(card) {
      cardStageEl.innerHTML = `
        <div class="panel-content">
          <div class="meta">${renderMeta(card)}</div>
          <div class="face-center" style="width: 100%;">
            <div class="front" style="font-size: clamp(24px, 3vw, 34px); max-width: 18ch;">Keyword Quiz</div>
            ${showChinese && card.front_zh ? `<div class="zh">参考: ${card.front_zh}</div>` : ''}
            <div style="font-size: clamp(18px, 2vw, 24px); line-height: 1.5; max-width: 32ch;">${card.back}</div>
            <div class="controls" style="margin-top: 4px; width: min(720px, 100%);">
              <input type="text" id="keywordInput" placeholder="Type keyword(s)" style="flex: 1; min-width: 220px;" />
              <button id="checkKeywordBtn" class="primary">Check</button>
            </div>
            <div class="feedback" id="keywordFeedback"></div>
          </div>
        </div>
      `;

      const keywordInputEl = document.getElementById('keywordInput');
      const checkKeywordBtn = document.getElementById('checkKeywordBtn');
      checkKeywordBtn.addEventListener('click', checkKeywords);
      keywordInputEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') checkKeywords();
      });
    }

    function renderCurrent() {
      resetPositionIfNeeded();
      const deck = activeDeck();

      if (!deck.length) {
        cardStageEl.innerHTML = `
          <div class="panel-content empty-state">
            <div style="font-size: 28px; font-weight: 800; color: var(--text);">No cards match current filters.</div>
            <div>Try selecting more units, levels, or categories.</div>
          </div>
        `;
        statusEl.textContent = 'No cards available';
        return;
      }

      const card = getCurrentCard();
      if (currentMode() === 'study') {
        renderStudy(card);
      } else if (currentMode() === 'mcq') {
        renderMcq(card);
      } else {
        renderKeyword(card);
      }

      statusEl.textContent = `Card ${currentIndex + 1} of ${deck.length}${currentMode() === 'study' ? ' • randomized order' : ''}`;
      toggleChineseBtn.textContent = `Chinese: ${showChinese ? 'On' : 'Off'} (C)`;
      toggleAnswerBtn.disabled = currentMode() !== 'study';
    }

    function toggleAnswer() {
      if (currentMode() !== 'study' || !activeDeck().length) return;
      showBack = !showBack;
      renderCurrent();
    }

    function nextCard() {
      const deck = activeDeck();
      if (!deck.length) return;
      currentIndex = (currentIndex + 1) % deck.length;
      showBack = false;
      renderCurrent();
    }

    function previousCard() {
      const deck = activeDeck();
      if (!deck.length) return;
      currentIndex = (currentIndex - 1 + deck.length) % deck.length;
      showBack = false;
      renderCurrent();
    }

    function toggleChinese() {
      showChinese = !showChinese;
      renderCurrent();
    }

    function checkKeywords() {
      if (!filteredCards.length || currentMode() !== 'keyword') return;
      const card = getCurrentCard();
      const keywordInputEl = document.getElementById('keywordInput');
      const keywordFeedbackEl = document.getElementById('keywordFeedback');
      const expected = (card.keywords || []).map(k => k.toLowerCase());
      const input = keywordInputEl.value.toLowerCase();

      if (expected.length === 0) {
        keywordFeedbackEl.textContent = 'This card has no keyword list yet.';
        keywordFeedbackEl.className = 'feedback bad';
        return;
      }

      const missing = expected.filter(k => !input.includes(k));
      if (missing.length === 0) {
        keywordFeedbackEl.textContent = 'Great! You included all expected keywords.';
        keywordFeedbackEl.className = 'feedback ok';
      } else {
        keywordFeedbackEl.textContent = `Missing keyword(s): ${missing.join(', ')}`;
        keywordFeedbackEl.className = 'feedback bad';
      }
    }

    modeSelectEl.addEventListener('change', () => {
      currentIndex = 0;
      showBack = false;
      renderCurrent();
    });
    toggleAnswerBtn.addEventListener('click', toggleAnswer);
    toggleChineseBtn.addEventListener('click', toggleChinese);
    nextBtn.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', previousCard);

    document.addEventListener('keydown', (event) => {
      const target = event.target;
      const typing = target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA');

      if ((event.key === 'c' || event.key === 'C') && !typing) {
        event.preventDefault();
        toggleChinese();
      } else if (event.key === ' ' && !typing) {
        event.preventDefault();
        toggleAnswer();
      } else if (event.key === 'ArrowRight' && !typing) {
        event.preventDefault();
        nextCard();
      } else if (event.key === 'ArrowLeft' && !typing) {
        event.preventDefault();
        previousCard();
      }
    });

    loadCards();
  </script>
</body>
</html>
